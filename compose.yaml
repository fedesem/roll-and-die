name: ${COMPOSE_PROJECT_NAME:-roll-and-die}

services:
  app-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ${DEV_CONTAINER_NAME:-roll-and-die-dev}
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      HOME: /tmp/app-home
      NPM_CONFIG_CACHE: /tmp/app-home/.npm
      PORT: ${SERVER_PORT:-4000}
    ports:
      - "${SERVER_PORT:-4000}:4000"
      - "${CLIENT_PORT:-5174}:5174"
    volumes:
      - .:/app
    restart: unless-stopped

  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROD_CONTAINER_NAME:-roll-and-die}
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${SERVER_PORT:-4000}:4000"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
